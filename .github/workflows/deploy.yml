name: Deploy Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json

      - name: Deploy
        env:
          # ระบุตำแหน่งไฟล์ให้ชัดเจน 100%
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
          # เปิดสวิตช์ Next.js ตรงนี้เลย ลีนกว่าการรันแยกบรรทัด
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          CI: true
        # เติม --force เพื่อป้องกันระบบหยุดรอคำตอบ (แก้ปัญหา Exit Code 1)
        run: firebase deploy --only hosting,functions --project bpi-aeropaths --force