name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    env:
      # จัดการเรื่อง Warning ของ GitHub และเปิดโหมดทดลองของ Firebase ให้ครอบคลุมทั้ง Job
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FIREBASE_CLI_EXPERIMENTS: webframeworks

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build
        env:
        
          NEXT_PUBLIC_FIREBASE_API_KEY: "${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}"
          NEXT_PUBLIC_FIREBASE_APP_ID: "${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}"
          BOT_API_KEY: "${{ secrets.BOT_API_KEY }}"

      - name: Deploy to Firebase (Rules, Storage & Hosting)
        run: |
          # 1. เช็กความถูกต้องของ Secret
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is missing or empty!"
            exit 1
          fi
          
          # 2. สร้างไฟล์ JSON สำหรับยืนยันตัวตน
          cat <<< "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS="${GITHUB_WORKSPACE}/service-account.json"
          
          # 3. รันคำสั่ง Deploy รวดเดียวจบ ทั้งเว็บและฐานข้อมูล
          npx firebase-tools deploy --only hosting,firestore:rules,storage --project bpi-aeropaths --non-interactive
          
          # 4. ลบไฟล์ทิ้งเพื่อความปลอดภัย
          rm -f service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
