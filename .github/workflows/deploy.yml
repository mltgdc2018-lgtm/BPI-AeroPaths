name: Deployment

on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # ปิดการแจ้งเตือนเรื่อง Node.js 20 Deprecation ของ GitHub
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # อัปเกรดเป็นเวอร์ชันใหม่เพื่อความเสถียร
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build
        env:
          # ส่ง API Key ให้ Next.js ใช้ตอน Build (ป้องกัน Error: Failed to collect page data)
          NEXT_PUBLIC_FIREBASE_API_KEY: "${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}"
          NEXT_PUBLIC_FIREBASE_APP_ID: "${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}"
          BOT_API_KEY: "${{ secrets.BOT_API_KEY }}"

      - name: Deploy Firestore & Storage Rules
        run: |
          # 1. เช็กว่าลืมใส่ Secret หรือไม่
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is missing or empty!"
            exit 1
          fi
          
          # 2. สร้างไฟล์ JSON อย่างปลอดภัย (แก้ปัญหาไฟล์ว่างเปล่า)
          cat <<< "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS="${GITHUB_WORKSPACE}/service-account.json"
          
          # 3. สั่ง Deploy Rules (แก้คำสั่งเป็น storage เฉยๆ ไม่มี :rules เพื่อไม่ให้ Error)
          npx firebase-tools deploy --only firestore:rules,storage --project bpi-aeropaths --non-interactive
          
          # 4. ลบไฟล์รหัสผ่านทิ้ง
          rm -f service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: bpi-aeropaths
          # 🚨 เพิ่ม 2 บรรทัดด้านล่างนี้เข้าไปครับ 🚨
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks